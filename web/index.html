<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPURenta — Test Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a; color: #e5e5e5; line-height: 1.5; padding: 24px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #a3a3a3; text-transform: uppercase; letter-spacing: 0.05em; }
  .card {
    background: #141414; border: 1px solid #222; border-radius: 12px;
    padding: 20px; margin-bottom: 20px;
  }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 6px;
    font-size: 12px; font-weight: 500;
  }
  .badge.online { background: #052e16; color: #4ade80; }
  .badge.offline { background: #1c1917; color: #a8a29e; }
  .badge.active { background: #1c3d2e; color: #4ade80; }
  .badge.idle { background: #1e293b; color: #94a3b8; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .label { color: #888; font-size: 12px; }
  .value { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
  .images-list { display: flex; gap: 8px; flex-wrap: wrap; }
  .image-tag {
    display: inline-block; padding: 4px 12px; border-radius: 8px;
    background: #1a1a2e; color: #818cf8; font-size: 13px; border: 1px solid #2e2e4e;
  }
  button {
    padding: 8px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  .btn-primary { background: #6366f1; color: white; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
  .btn-danger { background: #991b1b; color: white; }
  .btn-danger:hover { background: #7f1d1d; }
  .btn-secondary { background: #222; color: #ccc; border: 1px solid #333; }
  .btn-success { background: #166534; color: white; }
  .btn-success:hover { background: #14532d; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #222; font-size: 14px; }
  th { color: #888; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .status-bar {
    display: flex; align-items: center; gap: 8px; padding: 12px 16px;
    background: #0d0d0d; border: 1px solid #222; border-radius: 8px; margin-bottom: 24px; font-size: 13px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.green { background: #4ade80; }
  .dot.yellow { background: #eab308; }
  .dot.red { background: #ef4444; }
  .empty-state { text-align: center; padding: 40px 20px; color: #666; }
  .empty-state p { margin-top: 8px; font-size: 13px; }
  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px;
    font-size: 14px; z-index: 100; animation: slideUp 0.2s ease;
  }
  .toast.success { background: #166534; color: white; }
  .toast.error { background: #991b1b; color: white; }
  .toast.info { background: #1e3a5f; color: white; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .loading { opacity: 0.5; pointer-events: none; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex;
    align-items: center; justify-content: center; z-index: 50;
  }
  .modal {
    background: #141414; border: 1px solid #333; border-radius: 16px;
    padding: 24px; width: 400px; max-width: 90vw;
  }
  .modal h3 { font-size: 18px; margin-bottom: 16px; }
  .modal .form-group { margin-bottom: 16px; }
  .modal label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
  .modal select, .modal input {
    width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #333;
    background: #0d0d0d; color: #e5e5e5; font-size: 14px;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  td .btn-small { padding: 4px 12px; font-size: 12px; }
  @media (max-width: 600px) {
    .grid-2 { grid-template-columns: 1fr; }
    body { padding: 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <h1>GPURenta</h1>
      <div class="subtitle">Backend test dashboard — no auth required</div>
    </div>
    <div id="connectionStatus" class="status-bar" style="margin-bottom:0">
      <span class="dot yellow"></span>
      <span>Connecting...</span>
    </div>
  </div>

  <div style="margin-top:24px">
    <div class="card">
      <div class="card-header">
        <h2 style="margin:0">Available GPUs</h2>
        <button class="btn-secondary" onclick="refreshGPUs()">Refresh</button>
      </div>
      <div id="gpuList"><div class="empty-state"><p>No GPUs registered yet</p></div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 style="margin:0">Supported Workloads</h2>
      </div>
      <div id="workloadList"><div class="loading">Loading...</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 style="margin:0">Active Rentals</h2>
      </div>
      <div id="rentalList"><div class="empty-state"><p>No active rentals</p></div></div>
    </div>
  </div>
</div>

<div id="rentModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeRentModal()">
  <div class="modal">
    <h3>Rent GPU</h3>
    <div class="form-group">
      <label>GPU</label>
      <select id="rentGPU"></select>
    </div>
    <div class="form-group">
      <label>Workload Image</label>
      <select id="rentImage"></select>
    </div>
    <div class="form-group">
      <label>Hours</label>
      <input type="number" id="rentHours" value="1" min="1" max="24">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeRentModal()">Cancel</button>
      <button class="btn-primary" id="rentStartBtn" onclick="startRental()">Rent Now</button>
    </div>
  </div>
</div>

<script>
const API = ''
let TOKEN = ''
let RENTAL_ID = ''

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', ...(TOKEN ? { 'Authorization': 'Bearer ' + TOKEN } : {}), ...opts.headers },
    ...opts,
  })
  const data = await res.json()
  if (!res.ok) throw new Error(data.error || 'Request failed')
  return data
}

async function init() {
  try {
    const auth = await api('/v1/auth/dev', { method: 'POST' })
    TOKEN = auth.token
    setStatus('Connected', 'green')
  } catch (e) {
    setStatus('Connection failed: ' + e.message, 'red')
    return
  }
  await refreshGPUs()
  await loadWorkloads()
  await loadRentals()
}

function setStatus(text, color) {
  document.getElementById('connectionStatus').innerHTML =
    '<span class="dot ' + color + '"></span><span>' + text + '</span>'
}

function showToast(msg, type) {
  const el = document.createElement('div')
  el.className = 'toast ' + type
  el.textContent = msg
  document.body.appendChild(el)
  setTimeout(() => el.remove(), 3000)
}

async function refreshGPUs() {
  try {
    const gpus = await api('/v1/gpus')
    const el = document.getElementById('gpuList')
    if (!gpus.length) {
      el.innerHTML = '<div class="empty-state"><p>No GPUs registered yet</p><p style="color:#555;font-size:12px">Provider needs to register their GPU first</p></div>'
      return
    }
    el.innerHTML = '<table><thead><tr><th>GPU</th><th>VRAM</th><th>Price/h</th><th>Images</th><th>Status</th><th></th></tr></thead><tbody>' +
      gpus.map(g => '<tr>' +
        '<td><strong>' + g.gpu_model + '</strong><br><span class="label">' + g.id.slice(0,8) + '</span></td>' +
        '<td>' + g.vram_gb + 'GB</td>' +
        '<td>$' + (g.price_per_hour / 100).toFixed(2) + '</td>' +
        '<td>' + (g.supported_images || []).map(i => '<span class="image-tag" style="font-size:11px;padding:2px 8px">' + i + '</span>').join('') + '</td>' +
        '<td><span class="badge online">online</span></td>' +
        '<td><button class="btn-primary btn-small" onclick="openRentModal(\'' + g.id + '\')">Rent</button></td>' +
        '</tr>').join('') + '</tbody></table>'
  } catch (e) {
    document.getElementById('gpuList').innerHTML = '<div class="empty-state"><p>Error loading GPUs: ' + e.message + '</p></div>'
  }
}

async function loadWorkloads() {
  try {
    const imgs = await api('/v1/images')
    document.getElementById('workloadList').innerHTML =
      imgs.map(i => '<div class="image-tag">' + i.name + ' <span style="color:#666;font-weight:400">— ' + i.description + '</span></div>').join('')
  } catch (e) {
    document.getElementById('workloadList').innerHTML = '<div class="empty-state"><p>Error: ' + e.message + '</p></div>'
  }
}

async function loadRentals() {
  const el = document.getElementById('rentalList')
  el.innerHTML = '<div class="empty-state"><p>No active rentals</p></div>'
}

function openRentModal(gpuId) {
  document.getElementById('rentGPU').innerHTML = '<option value="' + gpuId + '">' + gpuId.slice(0,8) + '...</option>'
  api('/v1/images').then(imgs => {
    document.getElementById('rentImage').innerHTML = imgs.map(i => '<option value="' + i.name + '">' + i.name + '</option>').join('')
  })
  document.getElementById('rentModal').style.display = 'flex'
}

function closeRentModal() {
  document.getElementById('rentModal').style.display = 'none'
}

async function startRental() {
  const btn = document.getElementById('rentStartBtn')
  btn.disabled = true
  btn.textContent = 'Starting...'
  try {
    const rental = await api('/v1/rentals/start', {
      method: 'POST',
      body: JSON.stringify({
        agent_id: document.getElementById('rentGPU').value,
        image: document.getElementById('rentImage').value,
        hours: parseInt(document.getElementById('rentHours').value),
      }),
    })
    RENTAL_ID = rental.id
    showToast('Rental started! ID: ' + rental.id.slice(0,8), 'success')
    closeRentModal()

    const el = document.getElementById('rentalList')
    el.innerHTML = '<table><thead><tr><th>ID</th><th>Image</th><th>Status</th><th>Started</th><th>Expires</th><th>URL</th><th></th></tr></thead><tbody>' +
      '<tr>' +
      '<td>' + rental.id.slice(0,8) + '</td>' +
      '<td>' + rental.image + '</td>' +
      '<td><span class="badge active">active</span></td>' +
      '<td>' + new Date(rental.started_at).toLocaleTimeString() + '</td>' +
      '<td>' + new Date(rental.ends_at).toLocaleTimeString() + '</td>' +
      '<td><code style="font-size:12px;color:#818cf8">' + (rental.frp_url || 'no URL') + '</code></td>' +
      '<td><button class="btn-danger btn-small" onclick="stopRental(\'' + rental.id + '\')">Stop</button></td>' +
      '</tr></tbody></table>'
    refreshGPUs()
  } catch (e) {
    showToast('Error: ' + e.message, 'error')
  }
  btn.disabled = false
  btn.textContent = 'Rent Now'
}

async function stopRental(id) {
  if (!confirm('Stop this rental?')) return
  try {
    await api('/v1/rentals/' + id + '/stop', { method: 'POST' })
    showToast('Rental stopped', 'info')
    document.getElementById('rentalList').innerHTML = '<div class="empty-state"><p>No active rentals</p></div>'
    refreshGPUs()
  } catch (e) {
    showToast('Error: ' + e.message, 'error')
  }
}

init()
</script>
</body>
</html>
